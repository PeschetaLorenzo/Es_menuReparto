<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reparto mille sentieri</title>
    <link rel="icon" href="/img/icon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
</head>
<body>
    <header>
        <h1>Componi il tuo HotDog!</h1>
    </header>
    <main>
        <section id="hotdog">

            <div class="form-check form-switch ingrediente" id="check-Pane">
                <div>
                    <div>
                        <input class="form-check-input" type="checkbox" id="swtPane">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Pane</label>
                    </div>
                </div>
                <img src="img/PaneSup.png">
            </div>
            <div class="form-check form-switch ingrediente" id="check-Salsiccia">
                <div id="div_sals">
                    <div>
                        <input class="form-check-input" type="checkbox" id="swtSalsiccia">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Salsiccia</label>
                    </div>
                    <div>

                        <input class="form-check-input" type="checkbox" id="swtVeggie">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Vegetariano</label>
                    </div>
                </div>
                <img src="img/Salsiccia.png" id="img_salsiccia">
    
            </div>
            <div class="form-check form-switch ingrediente" id="check-Cipolle">
                <div>
                    <div>

                        <input class="form-check-input" type="checkbox" id="swtCipolle">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Cipolle</label>
                    </div>
                </div>
                <img src="img/Cipolla.png" alt="">
            </div>
            <div class="form-check form-switch ingrediente" id="check-Crauti">
                <div>
                    <div>

                        <input class="form-check-input" type="checkbox" id="swtCrauti">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Crauti</label>
                    </div>
                </div>
                <img src="img/Crauti.png" alt="">
            </div>
            <div class="form-check form-switch ingrediente" id="">
                <div></div>
                <img src="img/PaneInf.png" id="img_paneInf">
            </div>

        </section>

        <section id="contorno">
            <div class="form-check form-switch ingrediente" id="check-Patatine">
                <div>
                    <div>

                        <input class="form-check-input" type="checkbox" id="swtPatatine">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Patatine</label>
                    </div>
                </div>
                <img src="img/Patatine.png" alt="" id="img_patatine">
            </div>
            <div class="form-check form-switch ingrediente" id="check-Insalata">
                <div>
                    <div>

                        <input class="form-check-input" type="checkbox" id="swtInsalata">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Insalata</label>
                    </div>
                </div>
                <img src="img/Insalata.png" alt="" id="img_insalata">
            </div>
        </section>

        
    </main>
    <footer>
        <section id="btn">
            <button class="btn btn-primary" id="indietro"><span class="material-symbols-outlined">arrow_back_ios</span></button>
            <button class="btn btn-primary" id="conferma">CONFERMA</button>
            <button class="btn btn-primary" id="avanti"><span class="material-symbols-outlined">arrow_forward_ios</span></button>
        </section>
    </footer>
</body>
</html>
